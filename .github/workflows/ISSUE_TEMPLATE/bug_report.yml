name: Bug Report
description: Report a bug or unexpected behavior.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!

        Before submitting, please make sure the issue hasn't already been reported.

        The more information you provide, the easier it is for us to reproduce and fix the problem.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Describe the issue in as much detail as possible.
      placeholder: |
        Running `clickmigrate migrate` fails with an unexpected error...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps needed to reproduce the issue.
      placeholder: |
        1. Run `clickmigrate init`
        2. Create a migration file...
        3. Run `clickmigrate migrate`
        4. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: configuration
    attributes:
      label: Relevant configuration
      description: |
        If applicable, include relevant parts of your configuration
        (`clickmigrate.yml`, `pyproject.toml`, migration SQL, etc.).
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste the complete error message or traceback.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Python version:
        - ClickMigrate version:
        - ClickHouse server version:
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any additional information, screenshots, or files that may help us understand the issue.